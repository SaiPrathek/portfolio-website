<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Sai Prathek Kotha</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Newsreader:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; transition: background 0.5s, color 0.5s; }
    body.theme-f1 { background: #f9f9f9; color: #1a1c1c; font-family: 'Space Grotesk', sans-serif; }
    body.theme-office { background: #131313; color: #e5e2e1; font-family: 'Newsreader', serif; }
    .code { font-size: clamp(6rem, 15vw, 12rem); font-weight: 900; line-height: 1; opacity: 0.08; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    body.theme-f1 .code { font-style: italic; letter-spacing: -0.05em; }
    h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; position: relative; z-index: 1; }
    body.theme-f1 h1 { font-style: italic; }
    p { font-size: 1rem; opacity: 0.6; margin-bottom: 2rem; max-width: 400px; position: relative; z-index: 1; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; text-decoration: none; transition: all 0.3s; position: relative; z-index: 1; }
    body.theme-f1 .btn { background: linear-gradient(135deg, #b30400, #e53935); color: #fff; }
    body.theme-office .btn { background: #f2ca50; color: #131313; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .toggle { position: fixed; top: 24px; right: 24px; cursor: pointer; padding: 8px 16px; border-radius: 999px; border: 1.5px solid; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; transition: all 0.3s; z-index: 10; }
    body.theme-f1 .toggle { border-color: #b30400; color: #b30400; }
    body.theme-office .toggle { border-color: #f2ca50; color: #f2ca50; }
    .f1-only { display: none; }
    .office-only { display: none; }
    body.theme-f1 .f1-only { display: block; }
    body.theme-office .office-only { display: block; }
  </style>
</head>
<body class="theme-f1">
  <button class="toggle" onclick="document.body.classList.toggle('theme-f1');document.body.classList.toggle('theme-office');">
    <span class="f1-only">F1</span>
    <span class="office-only">OFFICE</span>
  </button>

  <div class="code">404</div>

  <div class="f1-only">
    <h1>DNF — Page Not Found</h1>
    <p>Looks like this page retired from the race. The marshals have been notified. Let's get you back to the pit lane.</p>
  </div>

  <div class="office-only">
    <h1>This Page Has Been Shredded</h1>
    <p>Somebody ran it through the paper shredder. Probably Dwight. Let's get you back to your desk.</p>
  </div>

  <a class="btn" href="/">
    <span class="material-symbols-outlined" style="font-size: 18px;">home</span>
    Return to Base
  </a>
</body>
</html>
